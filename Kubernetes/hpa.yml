kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2

metadata:
  name: my-app-hpa

spec:
  scaleTargetRef:
    kind: Deployment
    apiVersion: apps/v1
    name: my-app-deployment

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource  
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 2
